name: Split 32 incidents

on:
  pull_request:
    paths:
      - "backend/app/**incident**"
      - "backend/tests/test_incident_lifecycle.py"
      - "frontend/src/**incident**"
      - "frontend/package.json"
      - ".github/workflows/split-32-incidents.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet -r requirements.txt
      - name: Create and audit
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_create_inside_employment_period_and_register_audit
      - name: Reject outside employment period
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_incident_outside_employment_period_is_rejected
      - name: Validate overlaps
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_incompatible_overlap_requires_explicit_authorization
      - name: Validate optimistic lock
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_optimistic_lock_prevents_stale_update
      - name: Mark closed payroll regularization
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_change_affecting_closed_payroll_requires_regularization
      - name: Preserve logical cancellation
        run: python -m unittest tests.test_incident_lifecycle.IncidentLifecycleTest.test_delete_is_logical_and_preserves_history

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --silent
      - run: npm run test:incidencias
      - run: npm run build
      - run: npm run lint
