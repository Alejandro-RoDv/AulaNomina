name: Split 32 incidents

on:
  pull_request:
    paths:
      - "backend/app/**incident**"
      - "backend/app/models/payroll*.py"
      - "backend/app/payroll_stability_schema_patch.py"
      - "backend/tests/test_incident_*.py"
      - "frontend/src/**incident**"
      - "frontend/package.json"
      - ".github/workflows/split-32-incidents.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./aulanomina_incidents_test.db
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet -r requirements.txt
      - name: Run incident tests
        id: incident-tests
        continue-on-error: true
        run: python -m unittest -v tests.test_incident_lifecycle tests.test_incident_payroll_engine tests.test_advanced_incident_calculation tests.test_incident_structural_contracts tests.test_incident_payroll_calculation_result tests.test_incident_payroll_stability > incident-test.log 2>&1
      - name: Upload incident test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incident-test-log
          path: backend/incident-test.log
          if-no-files-found: error
      - name: Enforce incident test result
        if: steps.incident-tests.outcome == 'failure'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --silent
      - name: Run incident interface tests
        run: npm run test:incidencias
      - name: Build frontend
        run: npm run build
      - name: Lint complete incident workspace
        run: npx eslint src/pages/IncidentsPage.jsx src/components/incidents src/hooks/useIncidentsModule.js src/services/incidentApi.js src/services/httpClient.js src/utils/incidentCategories.js src/utils/incidentWorkspace.js src/utils/incidentPayloads.js src/tests/incidentPayloads.test.js src/tests/incidentWorkspace.test.js src/tests/incidentApiErrors.test.js
