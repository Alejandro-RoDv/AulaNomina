name: Frontend checks

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-checks.yml"
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint changed Convenios files
        id: lint
        continue-on-error: true
        run: npx eslint src/hooks/useAgreementWorkspace.js src/pages/CollectiveAgreementsWorkspacePageV2.jsx src/pages/CollectiveAgreementsManagementPageV2.jsx --format json --output-file lint-report.json
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: convenios-lint-report
          path: frontend/lint-report.json
      - name: Fail when checks fail
        if: steps.lint.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
