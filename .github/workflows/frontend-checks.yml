name: Frontend checks

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-checks.yml"
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint checked frontend files
        id: lint
        continue-on-error: true
        run: npx eslint src/hooks/useAppData.js src/hooks/useAgreementWorkspace.js src/pages/CollectiveAgreementsPage.js src/pages/CollectiveAgreementsPage.jsx src/pages/collectiveAgreementsLoader.js src/pages/CollectiveAgreementsWorkspacePage.jsx src/pages/CollectiveAgreementsManagementPage.jsx src/components/agreements/AgreementSalaryWorkspace.jsx src/components/agreements/AgreementCriteriaWorkspace.jsx src/components/agreements/AgreementSeniorityPanel.jsx src/components/agreements/management src/tests/convenios-smoke.jsx src/pages/EmbargoCalculatorPage.jsx src/pages/WageGarnishmentManagementPage.jsx src/pages/IncidentsPage.jsx src/components/wage-garnishments src/services/wageGarnishmentApi.js src/utils/embargoCalculator.js src/tests/embargoCalculator.test.js --format json --output-file lint-report.json
      - name: Frontend regression tests
        id: tests
        continue-on-error: true
        run: npm test
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-report
          path: frontend/lint-report.json
      - name: Fail when checks fail
        if: steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
