name: Backend checks

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-checks.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./aulanomina_test.db
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Compile backend
        run: python -m compileall app
      - name: Apply wage garnishment schema patch
        id: schema
        continue-on-error: true
        run: python -c "from app.wage_garnishment_schema_patch import apply_wage_garnishment_schema_patch; apply_wage_garnishment_schema_patch()" > backend-test-output.txt 2>&1
      - name: Wage garnishment tests
        id: tests
        continue-on-error: true
        run: python -m pytest -q --tb=short tests/test_wage_garnishment.py tests/test_wage_garnishment_calculator.py >> backend-test-output.txt 2>&1
      - name: Incident payroll engine tests
        id: incident_engine
        continue-on-error: true
        run: python -m unittest -v tests.test_incident_payroll_engine tests.test_payroll_incident_bridge tests.test_advanced_incident_calculation tests.test_incident_structural_contracts tests.test_incident_payroll_calculation_result >> backend-test-output.txt 2>&1
      - name: Import application
        id: import_app
        continue-on-error: true
        run: python -c "from app.main import app; print(app.title)" >> backend-test-output.txt 2>&1
      - name: Upload backend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: backend/backend-test-output.txt
      - name: Fail when checks fail
        if: steps.schema.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.incident_engine.outcome == 'failure' || steps.import_app.outcome == 'failure'
        run: exit 1
