name: Backend checks

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-checks.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./aulanomina_test.db
      PYTHONPATH: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Compile backend
        run: python -m compileall app
      - name: Wage garnishment tests
        id: tests
        continue-on-error: true
        run: python -m pytest -q --tb=short tests/test_wage_garnishment.py > backend-test-output.txt 2>&1
      - name: Upload backend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-output
          path: backend/backend-test-output.txt
      - name: Fail when backend tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1
